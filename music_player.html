<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIRCUIT BREAKER - Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #161625;
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.2);
            --text: #e0e0e0;
            --red: #ff3e3e;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 95%;
            margin-top: 50px;
            padding: 30px;
            background: var(--panel);
            border: 1px solid var(--accent-dim);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px var(--accent-dim);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 0.9em;
            border-left: 4px solid var(--accent);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .track-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .track-btn:hover {
            background: var(--accent-dim);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .track-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent-dim);
        }

        .track-btn span.sector {
            font-size: 0.7em;
            text-transform: uppercase;
            opacity: 0.7;
            font-weight: bold;
        }

        .track-btn span.title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1em;
        }

        .intensity-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        .int-btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.2s;
        }

        .int-btn.active {
            background: var(--accent);
            color: #000;
        }

        .master-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        #playStopBtn {
            background: var(--red);
            border: none;
            color: white;
            padding: 15px 50px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
            transition: 0.3s;
        }

        #playStopBtn.playing {
            background: #444;
            box-shadow: none;
        }

        .visualizer {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            margin-top: 20px;
        }

        .bar {
            width: 4px;
            background: var(--accent);
            height: 10%;
            transition: 0.1s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Circuit Breaker Audio Lab</h1>

        <div class="status-bar">
            <span id="currentStatus">SISTEMA: OFFLINE</span>
            <span id="currentBPM">BPM: ---</span>
            <span id="currentIntensity">INTENSIDADE: ---</span>
        </div>

        <div class="controls" id="trackGrid">
            <!-- Botões gerados via JS -->
        </div>

        <div class="intensity-selector">
            <button class="int-btn active" onclick="setIntensity(0)">LOW</button>
            <button class="int-btn" onclick="setIntensity(1)">MED</button>
            <button class="int-btn" onclick="setIntensity(2)">HIGH</button>
        </div>

        <div class="master-controls">
            <button id="playStopBtn" onclick="togglePlayback()">INICIAR SISTEMA</button>
        </div>

        <div class="visualizer" id="viz">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </div>

    <!-- Mocks e Dependências -->
    <script>
        // Define AudioSys no escopo global antes dos scripts carregarem
        window.audioCtx = null;
        window.AudioSys = {
            musicActive: false,
            currentThemeKey: 'industrial',
            musicIntensity: 0,
            current16thNote: 0,
            nextNoteTime: 0,
            tempoBPM: 120,
            masterGain: null,
            
            init() {
                if (window.audioCtx) return;
                window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = window.audioCtx.createGain();
                this.masterGain.gain.value = 0.5;
                this.masterGain.connect(window.audioCtx.destination);
            },

            resume() {
                if (window.audioCtx) window.audioCtx.resume();
            }
        };
    </script>

    <!-- Importa a lógica do jogo (Eles vão estender o window.AudioSys) -->
    <script src="js/audio/instruments.js"></script>
    <script src="js/audio/music.js"></script>

    <script>
        const tracks = [
            { id: 'industrial', sector: '01', title: 'Steel Heart Awakening' },
            { id: 'adventure', sector: '02', title: 'Binary Explorer' },
            { id: 'aero', sector: '03', title: 'Skyward Flow' },
            { id: 'aquatic', sector: '04', title: 'Quantum Abyss' },
            { id: 'jungle', sector: '05', title: 'Neon Wilds' },
            { id: 'void', sector: '06', title: 'Shadows of the Void' },
            { id: 'epic', sector: '07', title: 'Reality Breach' },
            { id: 'climax', sector: '08', title: 'Overclocked Spirit' },
            { id: 'singularity', sector: '09', title: 'Singularity Paradox' },
            { id: 'gothic', sector: '10', title: 'The Circuit Breaker' }
        ];

        const grid = document.getElementById('trackGrid');
        tracks.forEach(track => {
            const btn = document.createElement('button');
            btn.className = 'track-btn';
            btn.id = 'btn-' + track.id;
            btn.innerHTML = `
                <span class="sector">SETOR ${track.sector}</span>
                <span class="title">${track.title}</span>
            `;
            btn.onclick = () => selectTrack(track.id);
            grid.appendChild(btn);
        });

        function selectTrack(id) {
            AudioSys.currentThemeKey = id;
            document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
            if (document.getElementById('btn-' + id)) {
                document.getElementById('btn-' + id).classList.add('active');
            }
            
            if (AudioSys.musicActive) {
                // Passa a string diretamente agora que o music.js suporta
                AudioSys.playGameMusic(id);
            }
            updateStatus();
        }

        function setIntensity(val) {
            AudioSys.setMusicIntensity(val);
            document.querySelectorAll('.int-btn').forEach((b, i) => {
                b.classList.toggle('active', i === val);
            });
            updateStatus();
        }

        function togglePlayback() {
            const btn = document.getElementById('playStopBtn');
            if (!AudioSys.musicActive) {
                AudioSys.init();
                AudioSys.resume();
                // O music.js usa playGameMusic para iniciar
                AudioSys.playGameMusic(); 
                btn.innerText = "PARAR SISTEMA";
                btn.classList.add('playing');
                document.getElementById('currentStatus').innerText = "SISTEMA: ONLINE";
                selectTrack(AudioSys.currentThemeKey);
                animateViz();
            } else {
                // Usa a função oficial de parar
                AudioSys.stopGameMusic();
                btn.innerText = "INICIAR SISTEMA";
                btn.classList.remove('playing');
                document.getElementById('currentStatus').innerText = "SISTEMA: OFFLINE";
            }
        }

        function updateStatus() {
            document.getElementById('currentBPM').innerText = `BPM: ${AudioSys.tempoBPM}`;
            const intNames = ["LOW", "MED", "HIGH"];
            document.getElementById('currentIntensity').innerText = `INTENSIDADE: ${intNames[AudioSys.musicIntensity]}`;
        }

        function animateViz() {
            if (!AudioSys.musicActive) return;
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => {
                const h = Math.random() * 100;
                bar.style.height = h + '%';
                bar.style.opacity = 0.3 + (h/100);
            });
            setTimeout(animateViz, 100);
        }

        // Seleciona o primeiro por padrão
        selectTrack('industrial');
    </script>
</body>
</html>
