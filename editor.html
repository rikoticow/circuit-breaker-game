<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CIRCUIT BREAKER - Terminal de Edição</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { overflow: hidden; background: #050810; }
        #editor-container { display: flex; height: 100vh; color: #fff; font-family: 'VT323', monospace; }
        
        /* Sidebar / Tools */
        #sidebar { width: 300px; background: #111522; border-right: 2px solid #00f0ff; display: flex; flex-direction: column; }
        .sidebar-section { padding: 15px; border-bottom: 1px solid #222d44; }
        h2 { color: #00f0ff; margin-bottom: 10px; font-size: 24px; text-shadow: 0 0 10px #00f0ff44; }
        
        .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .tool-btn, .layer-btn { 
            background: #1a2233; border: 1px solid #334466; color: #8899bb; 
            padding: 8px; cursor: pointer; text-align: center;
        }
        .tool-btn:hover, .layer-btn:hover { background: #223344; color: #fff; }
        .tool-btn.active, .layer-btn.active { border-color: #00f0ff; color: #00f0ff; background: #00f0ff11; }
        
        #palette { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; 
            max-height: 250px; overflow-y: auto; padding-right: 5px;
        }
        .tile-opt { 
            aspect-ratio: 1; background: #0a0e1a; border: 1px solid #222d44; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-size: 20px;
        }
        .tile-opt:hover { border-color: #556688; }
        .tile-opt.active { border-color: #00ff9f; box-shadow: inset 0 0 5px #00ff9f44; }

        /* Level List with Reordering */
        #level-list-container { flex-grow: 1; overflow-y: auto; }
        .level-item { 
            padding: 8px 12px; border-bottom: 1px solid #222d44; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .level-item:hover { background: #1a2233; }
        .level-item.active { background: #00f0ff22; border-left: 4px solid #00f0ff; }
        .level-item .drag-handle { cursor: grab; color: #445577; }
        .level-item.dragging { opacity: 0.5; background: #00f0ff33; }

        /* Canvas Area */
        #main-view { flex-grow: 1; display: flex; flex-direction: column; position: relative; background: #000; }
        #canvas-wrapper { 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; 
            overflow: auto; padding: 20px;
        }
        canvas { background: #080a12; box-shadow: 0 0 40px rgba(0,0,0,0.5); cursor: crosshair; }
        
        #top-bar { 
            height: 50px; background: #111522; border-bottom: 2px solid #00f0ff;
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .input-group { display: flex; align-items: center; gap: 10px; }
        input[type="text"], input[type="number"] { 
            background: #050810; border: 1px solid #334466; color: #00f0ff; 
            padding: 5px 10px; font-family: 'VT323', monospace; font-size: 18px;
        }
        .btn-action { 
            background: #00f0ff22; border: 1px solid #00f0ff; color: #00f0ff; 
            padding: 5px 15px; cursor: pointer; font-family: 'VT323', monospace;
        }
        .btn-action:hover { background: #00f0ff44; color: #fff; }
        .btn-danger { border-color: #ff003c; color: #ff003c; background: #ff003c11; }
        .btn-danger:hover { background: #ff003c44; color: #fff; }

        /* Floating Properties Panel */
        #floating-props {
            position: absolute; background: #111522; border: 2px solid #00f0ff;
            padding: 10px; display: none; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            width: 150px;
        }
        #floating-props .prop-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        #floating-props label { color: #8899bb; font-size: 14px; }
        
        #overlay-ui {
            position: absolute; bottom: 20px; left: 20px; pointer-events: none;
            color: #00ff9f; text-shadow: 0 0 5px #000; font-size: 18px;
        }

        /* Test Mode Overlay */
        #test-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center;
            z-index: 500;
        }
        #test-canvas-container { position: relative; border: 4px solid #fff; }
        #test-notification {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #ff003c; font-size: 24px; pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div id="editor-container">
        <!-- Sidebar Tools -->
        <div id="sidebar">
            <div class="sidebar-section">
                <h2>FERRAMENTAS</h2>
                <div class="tool-grid">
                    <button class="tool-btn active" id="tool-brush" title="Pincel (B)">🖌️</button>
                    <button class="tool-btn" id="tool-rect" title="Retângulo (R)">⬛</button>
                    <button class="tool-btn" id="tool-line" title="Linha (L)">📏</button>
                    <button class="tool-btn" id="tool-eraser" title="Borracha (E)">🧽</button>
                    <button class="tool-btn" id="tool-select" title="Seleção (V)">🔦</button>
                    <button class="tool-btn" id="tool-undo" title="Desfazer (Ctrl+Z)">↩️</button>
                </div>

                <h2>CAMADAS</h2>
                <div class="tool-grid">
                    <button class="layer-btn active" id="layer-base" title="Base/Paredes">🧱</button>
                    <button class="layer-btn" id="layer-overlays" title="Fios/Conexões">🔌</button>
                    <button class="layer-btn" id="layer-blocks" title="Blocos Móveis">📦</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h2>PALETA</h2>
                <div id="palette">
                    <!-- Dynamic Palette -->
                </div>
            </div>

            <div class="sidebar-section" style="flex-grow: 1; display: flex; flex-direction: column;">
                <h2>CAPÍTULOS / NÍVEIS</h2>
                <select id="chapter-select" style="background:#050810; color:#00f0ff; border:1px solid #334466; padding:5px; margin-bottom:10px; font-family:'VT323';">
                    <!-- Chapters populated by JS -->
                </select>
                <div id="level-list-container">
                    <div id="level-list">
                        <!-- Levels populated by JS -->
                    </div>
                </div>
                <div style="padding-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <button class="btn-action" onclick="addNewLevel()">+ NÍVEL</button>
                    <button class="btn-action btn-danger" onclick="deleteCurrentLevel()">EXCLUIR</button>
                </div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div id="main-view">
            <div id="top-bar">
                <div class="input-group">
                    <input type="text" id="lvl-name" placeholder="NOME DO NÍVEL" style="width: 200px;">
                    <label>BAT:</label><input type="number" id="lvl-battery" value="30" style="width: 60px;">
                    <label>SEC:</label><input type="number" id="lvl-timer" value="60" style="width: 60px;">
                </div>
                <div class="input-group">
                    <button class="btn-action" onclick="startTest()">▶️ TESTAR</button>
                    <button class="btn-action" id="btn-save" style="border-color: #00ff9f; color: #00ff9f;">💾 SALVAR TUDO</button>
                </div>
            </div>

            <div id="canvas-wrapper">
                <canvas id="editor-canvas" width="640" height="480"></canvas>
            </div>

            <div id="overlay-ui">Coord: 0,0 | Sym: #</div>

            <!-- Floating Context Menu -->
            <div id="floating-props">
                <h3 id="prop-type" style="margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid #334466;">OBJETO</h3>
                <div class="prop-row">
                    <label>AMPS REQUISITADOS:</label>
                    <input type="number" id="prop-amps" min="1" max="9" value="1">
                </div>
                <div class="prop-row" id="prop-channel-container">
                    <label>CANAL / LINK:</label>
                    <input type="number" id="prop-channel" min="0" max="99" value="0">
                </div>
                <div class="prop-row" id="prop-toggle-container">
                    <label style="flex-direction: row; align-items: center; gap: 5px;">
                        <input type="checkbox" id="prop-toggle"> ALTERNÁVEL (TOGGLE)
                    </label>
                </div>
            </div>
        </div>

        <!-- Fullscreen Test Mode -->
        <div id="test-overlay">
            <div id="test-notification">REBOOTING...</div>
            <div id="test-canvas-container">
                <canvas id="test-canvas" width="640" height="480"></canvas>
                <!-- HUD will be rendered into the canvas or via JS -->
            </div>
            <div style="position: absolute; bottom: 20px; color: #888;">[ESC] PARA SAIR | [R] REINICIAR | [Z] VOLTAR</div>
            
            <!-- Manual UI for Test Mode -->
            <div id="test-hud" style="position: absolute; top: 0; left: 0; width: 100%; pointer-events: none;">
                 <!-- We'll reuse the HUD styles from index.html if needed, or draw directly -->
            </div>
        </div>
    </div>

    <!-- Engine Scripts -->
    <script src="js/levels.js"></script>
    <script src="js/graphics.js"></script>
    <script src="js/game.js"></script>
    <script src="js/audio.js"></script>
    <!-- Editor Logic -->
    <script src="js/editor.js"></script>
</body>
</html>
