<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIRCUIT BREAKER - Industrial Puzzle Engine</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts for retro aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <meta name="description" content="Um jogo de puzzle industrial onde você deve sincronizar circuitos de energia usando lógica e precisão.">
</head>
<body>
    <div id="game-container">
        <!-- Canvas for Game World -->
        <canvas id="game-canvas" width="640" height="480"></canvas>
        
        <!-- Transition Layer (Cinematic Doors) -->
        <canvas id="transition-canvas" width="640" height="560"></canvas>

        <!-- UI HUD Layer -->
        <div id="hud">
            <div class="hud-panel left">
                <div class="stat-group">
                    <label>SETOR</label>
                    <div id="level-name" class="value">01-01</div>
                </div>
                <div class="stat-group">
                    <label>SINCRONIA</label>
                    <div id="time" class="value">00:00</div>
                </div>
            </div>

            <div class="hud-panel center">
                <div class="energy-container">
                    <div class="label-row">
                        <span>BATERIA AUXILIAR</span>
                        <span id="power-count" class="digital">30</span>
                    </div>
                    <div class="bar-outer">
                        <div id="energy-bar" class="bar-inner"></div>
                    </div>
                </div>
            </div>

            <div class="hud-panel right">
                <div class="stat-group">
                    <label>REQUISITO AMP</label>
                    <div id="amps-bar" class="segmented-bar">
                        <!-- Segments generated by JS -->
                    </div>
                </div>
                <div class="stat-group">
                    <label>SUCATA</label>
                    <div id="score" class="value">0/0</div>
                </div>
            </div>

            <!-- Lives/Attempts -->
            <div id="lives-container">
                <div id="lives-bar" class="segmented-bar red">
                    <!-- 3 life segments -->
                </div>
            </div>
        </div>

        <!-- Start/Menu Overlay -->
        <div id="menu-overlay" class="overlay">
            <div class="terminal-text">
                <h1 class="glitch-title" data-text="CIRCUIT BREAKER">CIRCUIT BREAKER</h1>
                <p class="subtitle">SISTEMA DE SINCRONIA INDUSTRIAL v2.4</p>
                <div class="menu-actions">
                    <button id="btn-start" class="btn-main">INICIALIZAR SEQUÊNCIA</button>
                    <div class="control-hints">
                        <p>[WASD] MOVIMENTAÇÃO / EMPURRAR</p>
                        <p>[ESPACE] ROTAÇÃO / INTERAGIR</p>
                        <p>[Z] REVERTER AÇÃO (UNDO)</p>
                        <p>[R] REINICIAR (REBOOT)</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- CRT Scanline Effect -->
        <div class="scanlines"></div>
        <div class="vignette"></div>
    </div>

    <!-- Scripts -->
    <script src="js/levels.js"></script>
    <script src="js/graphics.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/game.js"></script>
    <script src="js/levelSelector.js"></script>
    <script src="js/resultScreen.js"></script>
    
    <script>
        // Main Entry Point
        window.onload = () => {
            const canvas = document.getElementById('game-canvas');
            const tCanvas = document.getElementById('transition-canvas');
            
            // 1. Init Systems
            Graphics.init(canvas, tCanvas);
            
            // 2. Global Game State
            window.game = new GameState();
            
            // 3. Level Selector Logic
            LevelSelector.init();

            // 4. Input Handling
            window.addEventListener('keydown', (e) => {
                if (game.state === 'MENU') {
                    if (e.key === ' ' || e.key === 'Enter') {
                        document.getElementById('btn-start').click();
                    }
                    LevelSelector.handleInput(e);
                    return;
                }

                if (game.state === 'RESULT') {
                    ResultScreen.handleInput(e);
                    return;
                }

                if (game.state === 'PLAYING') {
                    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') game.movePlayer(0, -1);
                    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') game.movePlayer(0, 1);
                    else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') game.movePlayer(-1, 0);
                    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') game.movePlayer(1, 0);
                    else if (e.key === ' ' || e.key === 'e' || e.key === 'E') game.interact();
                    else if (e.key === 'z' || e.key === 'Z') game.doUndo();
                    else if (e.key === 'r' || e.key === 'R') {
                        // Double tap R to restart?
                        if (game.rebootConfirmTimer) {
                            clearTimeout(game.rebootConfirmTimer);
                            game.rebootConfirmTimer = null;
                            game.loadLevel(game.levelIndex);
                        } else {
                            game.rebootConfirmTimer = setTimeout(() => {
                                game.rebootConfirmTimer = null;
                            }, 1000);
                        }
                    }
                    else if (e.key === 'Escape') {
                        game.state = 'MENU';
                        document.getElementById('menu-overlay').style.display = 'flex';
                        if (window.AudioSys) AudioSys.setMenu(true);
                    }
                }
            });

            document.getElementById('btn-start').onclick = () => {
                const startLevelIdx = LevelSelector.getSelectedLevelIdx();
                game.loadLevel(startLevelIdx);
                document.getElementById('menu-overlay').style.display = 'none';
                if (window.AudioSys) {
                    AudioSys.init();
                    AudioSys.setMenu(false);
                }
            };

            // 5. Main Loop
            function loop(timestamp) {
                game.update();
                Graphics.render(game);
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        };
    </script>
</body>
</html>
